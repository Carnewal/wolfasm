<!--
  ET: Legacy WASM — Emscripten HTML shell.
  Baked into etl.html at link time (emcc --shell-file web/shell.html).
  The browser-side logic lives in shell.js (loaded before the Emscripten glue,
  which replaces {{{ SCRIPT }}} and reads the global `Module` shell.js defines).
-->
<style>
  html, body { margin: 0; padding: 0; background: #000; color: #ccc; font-family: monospace; height: 100%; overflow: hidden; }
  #wrap { display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; }
  /* Fill the viewport. shell.js sets the render resolution (r_customwidth/height)
     to the window size, so the framebuffer matches the display 1:1 — no non-uniform
     stretching, so Emscripten's clientX/Y -> canvas-pixel mapping stays accurate. */
  #canvas { border: 0; background: #000; display: block; width: 100vw; height: 100vh; }
  #status { position: fixed; top: 8px; left: 8px; z-index: 10; font-size: 13px; text-shadow: 0 0 3px #000; }
  #progress { position: fixed; top: 28px; left: 8px; z-index: 10; width: 240px; }
  #output { position: fixed; bottom: 0; left: 0; right: 0; max-height: 30vh; overflow: auto;
            background: rgba(0,0,0,0.6); font-size: 11px; white-space: pre-wrap; padding: 4px; display: none; }
</style>

<div id="wrap">
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <div id="status">Downloading…</div>
  <progress id="progress" value="0" max="100" hidden></progress>
  <pre id="output"></pre>
</div>

<!-- Runtime config injected by the Go server (/config.js): master/MOTD addresses
     resolved server-side. Loaded before shell.js, which reads window.WOLFASM_CONFIG.
     Absent when serving statically without the Go server; shell.js falls back. -->
<script type="text/javascript" src="config.js"></script>

<!-- Browser shell logic (defines the global Module). Loaded before the asset
     bundles and the Emscripten glue so Module exists when they run. -->
<script type="text/javascript" src="shell.js"></script>

<!-- Asset packages — populate the virtual FS before main():
     etl_data.js       = base paks (etmain) + legacy mod client assets -> /etl
     etl_mods_data.js  = cgame/ui/qagame SIDE_MODULE .wasm binaries -> /etl/legacy -->
<script async type="text/javascript" src="etl_data.js"></script>
<script async type="text/javascript" src="etl_mods_data.js"></script>
{{{ SCRIPT }}}
